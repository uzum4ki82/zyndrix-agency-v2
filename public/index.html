<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
  <title>Zyndrix | Agencia de IA & Automatización — Soluciones de Élite</title>
  <meta name="description" content="Agencia líder en inteligencia artificial y automatización para empresas. Optimizamos procesos y escalamos resultados con tecnología de vanguardia.">
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preload" as="image" href="img/zyndrix-live.png" fetchpriority="high">

  <!-- ==============================================
       CSS ESTÁTICO v35.0 (Zero-Drop Stability)
       ============================================== -->
  <style>
    :root {
      --bg-primary: #020b0d; --bg-secondary: #04161a; --primary: #2DD4BF;
      --cyan: #2DD4BF; --violet: #A855F7; --text-primary: #F8FAFC;
      --text-secondary: #94A3B8; --font-heading: 'Outfit', sans-serif;
      --font-body: 'Plus Jakarta Sans', sans-serif; --radius-full: 9999px;
    }

    /* Base Reset y Bloqueo de Scroll Involuntario */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { 
      width: 100%; max-width: 100vw; overflow-x: hidden; 
      background: var(--bg-primary); color: var(--text-primary);
      font-family: var(--font-body); -webkit-font-smoothing: antialiased;
    }

    .container { max-width: 1240px; margin: 0 auto; padding: 0 40px; width: 100%; }
    
    /* NAVBAR MASTER */
    .navbar {
      position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
      padding: 15px 0; background: transparent; width: 100%; transition: all 0.4s ease;
    }
    .navbar.scrolled { 
      padding: 12px 0; background: rgba(2, 22, 26, 0.98); 
      backdrop-filter: blur(20px); border-bottom: 1px solid rgba(255, 255, 255, 0.05); 
    }
    .navbar .container { display: flex; align-items: center; justify-content: space-between; gap: 24px; }
    
    .nav-logo-img { height: 68px !important; width: auto; object-fit: contain; }
    
    .nav-links {
      display: flex; align-items: center; gap: 28px; margin: 0 auto;
      padding: 8px 24px; background: rgba(15, 23, 42, 0.4);
      border: 1px solid rgba(255, 255, 255, 0.05); border-radius: var(--radius-full);
      backdrop-filter: blur(12px); position: relative;
    }
    .nav-links a { font-size: 0.95rem; font-weight: 600; color: var(--text-secondary); text-decoration: none; }

    #navIndicator {
      position: absolute; height: calc(100% - 12px); background: rgba(0, 245, 255, 0.1);
      border: 1px solid rgba(0, 245, 255, 0.4); border-radius: var(--radius-full);
      z-index: -1; transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1); opacity: 0;
    }
    
    .nav-actions { display: flex; align-items: center; gap: 16px; z-index: 1001; flex: 1; justify-content: flex-end; }
    .btn-primary-elite {
      display: inline-flex; align-items: center; justify-content: center;
      padding: 12px 30px; background: black; color: white; border-radius: 12px;
      font-weight: 800; font-size: 0.9rem; border: 1px solid rgba(45, 212, 191, 0.4);
      text-decoration: none; text-transform: uppercase;
    }

    /* HERO SIN CAÍDA (Zero transform jump) */
    .hero { 
      min-height: 100vh; display: flex; align-items: center; 
      justify-content: center; text-align: center; position: relative; 
      padding-top: 40px; /* Ajuste milimétrico */
    }
    .hero h1 { font-size: clamp(2.5rem, 6vw, 4.5rem); font-weight: 700; line-height: 1.1; margin-bottom: 24px; color: #fff; }
    .gradient-text { background: linear-gradient(135deg, #2DD4BF 0%, #3B82F6 50%, #A855F7 100%); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
    
    .reveal { opacity: 1 !important; visibility: visible !important; transform: none !important; }

    /* Estabilización de Animación (Sin translateY para evitar el "salto") */
    @keyframes fade-stable { from { opacity: 0; } to { opacity: 1; } }
    .hero-tag-mini, .hero h1, .hero-subtitle, .hero-ctas { animation: fade-stable 0.8s ease both; }

    /* MOBILE REGLAS */
    .mobile-toggle { display: none; flex-direction: column; gap: 5px; background: none; border: none; cursor: pointer; padding: 10px; z-index: 1002; }
    .mobile-toggle span { width: 24px; height: 2px; background: #fff; transition: 0.3s; border-radius: 2px; }

    @media (max-width: 991px) {
      .container { padding: 0 20px; }
      .nav-links { display: none !important; }
      .mobile-toggle { display: flex !important; }
      .nav-logo-img { height: 44px !important; }
      .hero { padding-top: 20px; }
    }
  </style>

  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
  <link rel="stylesheet" href="styles.css?v=35.0" media="print" onload="this.media='all'">
  
  <link rel="icon" href="img/favicon-zyndrix.png">
</head>
<body onload="window.scrollTo(0, 0);"> <!-- FORCE TOP POSITION ON LOAD -->

  <div class="read-progress-bar"></div>

  <nav class="navbar reveal" id="navbar">
    <div class="container">
      <a href="/" class="nav-logo">
        <img src="img/zyndrix-live.png" alt="Zyndrix Logo" class="nav-logo-img" width="240" height="68" fetchpriority="high">
      </a>
      
      <div class="nav-links" id="navLinks">
        <div id="navIndicator"></div>
        <a href="#soluciones" class="active">Soluciones</a>
        <a href="#nosotros">Nosotros</a>
        <a href="#contacto">Contacto</a>
      </div>

      <div class="nav-actions">
        <a href="#contacto" class="btn-primary-elite">
          <span>CONSULTA GRATIS</span>
        </a>
        <button class="mobile-toggle" id="mobileToggle">
          <span></span>
          <span></span>
          <span></span>
        </button>
      </div>
    </div>
  </nav>

  <main>
    <section class="hero" id="home">
      <div class="hero-bg"></div>
      <canvas id="aiNetworkCanvas"></canvas>
      <div class="hero-content">
        <br><br>
        <div class="hero-tag-mini">
          <span class="dot"></span>
          <span>SYSTEMS IA v2.8</span>
          <span class="tag-divider">|</span>
          <span class="gradient-text">ULTRA FAST</span>
        </div>
        <h1 class="reveal">
          Escala tu Agencia con <br>
          <span class="gradient-text">Inteligencia Radical</span>
        </h1>
        <p class="hero-subtitle reveal">
          Diseñamos ecosistemas de IA que sustituyen procesos manuales por eficiencia pura.
        </p>
        <div class="hero-ctas reveal">
          <a href="/blueprint" class="btn-primary-elite">
            <span>VER BLUEPRINT</span>
          </a>
          <a href="#contacto" class="btn-primary-elite" style="background: transparent; border-color: rgba(255,255,255,0.2);">
            <span>HABLAR CON EXPERTO</span>
          </a>
        </div>
      </div>
    </section>

    <!-- FORMULARIO SEGURO -->
    <section class="section" id="contacto" style="padding: 100px 0;">
      <div class="container">
        <div class="section-header" style="text-align: center; margin-bottom: 50px;">
          <h2 class="section-title">Inicia tu <span class="gradient-text">Evolución</span></h2>
        </div>
        <div class="contact-form-container" style="max-width: 600px; margin: 0 auto;">
          <form id="leadForm">
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px;">
              <input type="text" name="name" placeholder="Nombre" required style="padding: 15px; border-radius: 8px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: #fff;">
              <input type="email" name="email" placeholder="Email" required style="padding: 15px; border-radius: 8px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: #fff;">
            </div>
            <textarea name="message" placeholder="¿Cómo te ayudamos?" required style="width: 100%; height: 120px; padding: 15px; border-radius: 8px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: #fff; margin-bottom: 20px;"></textarea>
            <button type="submit" class="btn-primary-elite" style="width: 100%;">ENVIAR SOLICITUD</button>
          </form>
        </div>
      </div>
    </section>
  </main>

  <script src="landing-script.js?v=35.0" defer></script>
</body>
</html>
