<!DOCTYPE html>
<html lang="es">

  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <!-- RESTAURAMOS EL CSS ORIGINAL SIN TRUCOS QUE CAUSEN SALTOS -->

<body>

  <nav class="navbar reveal" id="navbar">

      <a href="/" class="nav-logo">
        <img src="img/zyndrix-live.png" alt="Zyndrix Logo" class="nav-logo-img" width="240" height="68" fetchpriority="high">
      </a>
      
      <div class="nav-links" id="navLinks">
        <div id="navIndicator" class="nav-indicator"></div>
        <a href="#soluciones">Soluciones</a>

      <div class="nav-actions">

        </p>
        <div class="hero-ctas reveal">
          <a href="/blueprint" class="btn-primary-elite">
            <span>VER BLUEPRINT</span>
          </a>
          <a href="#contacto" class="btn-secondary-elite">
            <span>HABLAR CON EXPERTO</span>
          </a>

    <!-- EL RESTO SIGUE IGUAL (Sitemap e Indexación se mantienen) -->
  </main>

  <script src="landing-script.js" defer></script>
